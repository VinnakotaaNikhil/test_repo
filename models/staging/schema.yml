version: 2

sources:
  - name: dbt_source
    database: internship-project-484400
    schema: dbt_source
    tables:
      - name: src_customers
      - name: src_inventory
      - name: src_marketing_campaigns
      - name: src_order_items
      - name: src_orders
      - name: src_products
      - name: src_retail_price

models:
  - name: stg_customers
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique

      - name: signup_date
        data_tests:
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        data_tests:
          - not_null
          - unique

      - name: customer_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_customers')
                field: customer_id

      - name: order_status
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped', 'returned', 'cancelled']

  - name: stg_order_items
    columns:
      - name: order_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_orders')
                field: order_id

      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: quantity
        data_tests:
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        data_tests:
          - not_null
          - unique

      - name: product_name_length
        data_tests:
          - not_null

  - name: stg_inventory
    columns:
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: stock_on_hand
        data_tests:
          - not_null

  - name: stg_marketing_campaigns
    columns:
      - name: campaign_id
        data_tests:
          - not_null
          - unique


  - name: stg_retail_price
    columns:
      - name: product_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_products')
                field: product_id

      - name: unit_price
        data_tests:
          - not_null